{% extends 'catalog/base.html' %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANiVibe</title>
</head>
<body>

    
    {% block content %}
        <div class="hero-section">
            <div class="hero-text">
                <h1 id="hero-title">Discover Top <span style="color: var(--accent-color);">Anime</span></h1>
                <p>Your ultimate cinematic & affiliate streaming guide.</p>
            </div>

            <div class="model-container" style="width: 100%; height: 400px; display: flex; justify-content: center; align-items: center;">
                
                <div class="css-3d-element">
                    <img src="{% static "image/2.jpeg" %}" id="floating-poster" alt="Floating Poster" style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px;"><span id="floating-text">ANIEVIBE</span>
                </div>

            </div>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" class="modern-search" placeholder="Search for Anime...">
            <button class="search-btn" id="search-btn">Search</button>
        </div>

        <div class="content-container">
            <h2 class="section-title">Trending Now</h2>
            <div class="bento-grid">
                
                <div class="bento-card">
                    <div class="card-image" style="background-image: url('https://i0.wp.com/doublesama.com/wp-content/uploads/2021/06/Jujutsu-Kaisen-cover-1.jpg?resize=640%2C907');"></div>
                    <div class="card-info">
                        <h3>Jujutsu Kaisen</h3>
                        <a href="#" class="affiliate-btn">▶ Watch on Crunchyroll</a>
                    </div>
                </div>

                <div class="bento-card">
                    <div class="card-image" style="background-image: url('https://yenpress.com/uploads/Solo-Leveling-Vol-13.jpg');"></div>
                    <div class="card-info">
                        <h3>Solo Leveling</h3>
                        <a href="#" class="affiliate-btn">▶ Watch on Prime Video</a>
                    </div>
                </div>

            </div>
        </div>
    {% endblock %}




    
</body>
</html>
